{% load static tailwind_tags %} 
<!DOCTYPE html> 
<html lang="id"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Panel User SIMM</title> 
    {% tailwind_css %} 
    <link rel="icon" type="image/png" href="{% static 'images/logo_kab-bekasi.png' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> 
</head> 
<body class="bg-cover bg-center h-screen flex items-center justify-center font-sans relative" style="background-image: url('{% static "images/Data_Centre_Building.jpg" %}');"> 
    
    <div class="absolute inset-0 bg-black/20"></div> 
    
    <div class="relative bg-white/95 backdrop-blur-sm px-8 py-8 rounded-2xl shadow-2xl w-full max-w-[400px] z-10 flex flex-col items-center border border-white/50"> 
        
        <img src="{% static 'images/logo_diskominfo-kab-bekasi.png' %}" alt="Logo Diskominfosantik" class="h-[55px] w-auto object-contain mx-auto mb-2 block"> 
        
        <h1 class="text-2xl font-extrabold text-[#1a2b4c] mb-1 text-center">Pembaruan Keamanan</h1> 
        <p class="text-xs text-gray-500 mb-6 text-center px-2">Anda wajib membuat kata sandi baru untuk mengamankan akun sebelum melanjutkan ke dasbor utama</p> 

        {% if messages %}
        <div class="mb-4 w-full">
            {% for message in messages %}
            <div class="p-3 rounded-md text-sm {% if message.tags == 'error' %}bg-red-100 text-red-700 border border-red-200{% else %}bg-green-100 text-green-700 border border-green-200{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST" class="w-full space-y-4"> 
            {% csrf_token %}

            <div> 
                <label class="block text-[11px] text-[#4a5568] font-semibold mb-1.5 text-left">Kata Sandi Baru <span class="text-red-500">*</span></label> 
                <div class="relative"> 
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-[#a0aec0]"> 
                        <i class="fa-solid fa-lock text-xs"></i> 
                    </div> 
                    <input type="password" name="password" placeholder="Minimal 8 karakter" required 
                           class="w-full border border-gray-200 rounded-md py-2.5 pl-9 pr-3 text-sm focus:outline-none focus:border-[#00c3ff] focus:ring-1 focus:ring-[#00c3ff] bg-white text-gray-700"> 
                </div> 
            </div> 

            <div> 
                <label class="block text-[11px] text-[#4a5568] font-semibold mb-1.5 text-left">Konfirmasi Kata Sandi <span class="text-red-500">*</span></label> 
                <div class="relative"> 
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-[#a0aec0]"> 
                        <i class="fa-solid fa-lock text-xs"></i> 
                    </div> 
                    <input type="password" name="confirm_password" placeholder="Ulangi kata sandi baru" required 
                           class="w-full border border-gray-200 rounded-md py-2.5 pl-9 pr-3 text-sm focus:outline-none focus:border-[#00c3ff] focus:ring-1 focus:ring-[#00c3ff] bg-white text-gray-700"> 
                </div> 
            </div> 
            
            <button type="submit" class="w-full bg-[#00c3ff] hover:bg-[#00a3d9] text-white font-semibold py-3 rounded-md transition-colors flex justify-center items-center gap-2 mt-5"> 
                Simpan &amp; Lanjutkan ke Dasbor <i class="fa-solid fa-arrow-right"></i> 
            </button> 
        </form> 
    </div> 
</body> 
</html>
