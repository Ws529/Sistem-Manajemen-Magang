{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi - SIM Magang Portofolio</title>
    {% tailwind_css %}
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-cover bg-center bg-no-repeat relative"
      style="background-image: url('{% static 'images/Data_Centre _Building.jpg' %}');">

    <!-- Overlay -->
    <div class="absolute inset-0 bg-black/40 backdrop-blur-[2px]"></div>

    <div class="relative z-10 w-full max-w-[540px] bg-white rounded-[20px] shadow-2xl p-10">

        <!-- Header -->
        <div class="mb-7">
            <div class="mb-4">
                <img src="{% static 'images/logo_diskominfo-kab-bekasi.jpg' %}" alt="Logo Diskominfosantik" class="h-11 object-contain mix-blend-multiply">
            </div>
            <p class="text-[10px] font-bold text-[#0891b2] uppercase tracking-wider mb-1.5">DISKOMINFOSANTIK KAB. BEKASI</p>
            <h1 class="text-[28px] font-bold text-[#1e3a5f] leading-tight">Registrasi Akun Magang</h1>
        </div>

        <!-- Messages -->
        {% if messages %}
        <div class="mb-5 space-y-2">
            {% for message in messages %}
            <div class="text-sm px-4 py-2.5 rounded-lg
                {% if message.tags == 'error' %}bg-red-50 text-red-600 border border-red-200
                {% else %}bg-green-50 text-green-600 border border-green-200{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <!-- Form -->
        <form method="POST" action="{% url 'register' %}" class="space-y-4">
            {% csrf_token %}

            <!-- Nama Lengkap -->
            <div class="space-y-1.5">
                <label class="text-[13px] font-semibold text-[#64748b]">Nama Lengkap</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-[#94a3b8]">
                        <svg class="h-[18px] w-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                        </svg>
                    </span>
                    <input type="text" name="nama_lengkap" value="{{ form_data.nama_lengkap|default:'' }}"
                           placeholder="Masukkan nama lengkap sesuai KTP"
                           class="w-full pl-10 pr-4 py-2.5 text-[13px] rounded-lg border border-gray-300 focus:border-[#00c3ff] focus:ring-1 focus:ring-[#00c3ff] outline-none bg-white text-gray-700 placeholder-gray-400"
                           required>
                </div>
            </div>

            <!-- NIM & Asal Universitas -->
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1.5">
                    <label class="text-[13px] font-semibold text-[#64748b]">NIM</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-[#94a3b8]">
                            <svg class="h-[18px] w-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2"/>
                            </svg>
                        </span>
                        <input type="text" name="nim" value="{{ form_data.nim|default:'' }}"
                               placeholder="Nomor Induk Mahasiswa"
                               class="w-full pl-10 pr-4 py-2.5 text-[13px] rounded-lg border border-gray-300 focus:border-[#00c3ff] focus:ring-1 focus:ring-[#00c3ff] outline-none bg-white text-gray-700 placeholder-gray-400"
                               required>
                    </div>
                </div>
                <div class="space-y-1.5">
                    <label class="text-[13px] font-semibold text-[#64748b]">Asal Universitas</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-[#94a3b8]">
                            <svg class="h-[18px] w-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 14l9-5-9-5-9 5 9 5z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/>
                            </svg>
                        </span>
                        <input type="text" name="universitas" value="{{ form_data.universitas|default:'' }}"
                               placeholder="Nama Perguruan Tinggi"
                               class="w-full pl-10 pr-4 py-2.5 text-[13px] rounded-lg border border-gray-300 focus:border-[#00c3ff] focus:ring-1 focus:ring-[#00c3ff] outline-none bg-white text-gray-700 placeholder-gray-400"
                               required>
                    </div>
                </div>
            </div>

            <!-- Email -->
            <div class="space-y-1.5">
                <label class="text-[13px] font-semibold text-[#64748b]">Email</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-[#94a3b8]">
                        <svg class="h-[18px] w-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                        </svg>
                    </span>
                    <input type="email" name="email" value="{{ form_data.email|default:'' }}"
                           placeholder="Gunakan email aktif"
                           class="w-full pl-10 pr-4 py-2.5 text-[13px] rounded-lg border border-gray-300 focus:border-[#00c3ff] focus:ring-1 focus:ring-[#00c3ff] outline-none bg-white text-gray-700 placeholder-gray-400"
                           required>
                </div>
            </div>

            <!-- Password & Konfirmasi -->
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1.5">
                    <label class="text-[13px] font-semibold text-[#64748b]">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-[#94a3b8]">
                            <svg class="h-[18px] w-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                            </svg>
                        </span>
                        <input type="password" name="password"
                               placeholder="Minimal 8 karakter"
                               class="w-full pl-10 pr-4 py-2.5 text-[13px] rounded-lg border border-gray-300 focus:border-[#00c3ff] focus:ring-1 focus:ring-[#00c3ff] outline-none bg-white text-gray-700 placeholder-gray-400"
                               required minlength="8">
                    </div>
                </div>
                <div class="space-y-1.5">
                    <label class="text-[13px] font-semibold text-[#64748b]">Konfirmasi Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-[#94a3b8]">
                            <svg class="h-[18px] w-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                            </svg>
                        </span>
                        <input type="password" name="password_confirm"
                               placeholder="Ulangi password"
                               class="w-full pl-10 pr-4 py-2.5 text-[13px] rounded-lg border border-gray-300 focus:border-[#00c3ff] focus:ring-1 focus:ring-[#00c3ff] outline-none bg-white text-gray-700 placeholder-gray-400"
                               required minlength="8">
                    </div>
                </div>
            </div>

            <!-- Submit -->
            <button type="submit"
                    class="w-full bg-[#00c3ff] hover:bg-[#00b8f0] active:bg-[#00a3d9] text-white font-bold py-3 px-4 rounded-lg transition-all flex items-center justify-center gap-2 mt-6 shadow-md">
                Daftar Akun
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
                </svg>
            </button>
        </form>

        <p class="mt-5 text-center text-[13px] text-[#64748b]">
            Sudah punya akun? <a href="{% url 'login' %}" class="text-[#00c3ff] font-semibold hover:underline">Masuk di sini</a>
        </p>
    </div>
</body>
</html>
