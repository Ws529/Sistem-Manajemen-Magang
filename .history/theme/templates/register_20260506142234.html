{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi - SIM Magang Portofolio</title>
    {% tailwind_css %}
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-cover bg-center bg-no-repeat relative" style="background-image: url({% static 'images/Data_Centre _Building.jpg' %});">
    <!-- Overlay for the background image -->
    <div class="absolute inset-0 bg-black/40 backdrop-blur-[2px]"></div>

    <div class="relative z-10 w-full max-w-2xl bg-[#f8fafc] rounded-[1.5rem] shadow-2xl p-8 md:p-10">
        
        <!-- Header -->
        <div class="mb-8">
            <div class="mb-5">
                <img src="{% static 'images/logo_diskominfo-kab-bekasi.jpg' %}" alt="Logo" class="h-10 object-contain mix-blend-multiply">
            </div>
            <p class="text-xs font-bold text-[#007ba7] uppercase tracking-wide mb-2">DISKOMINFOSANTIK KAB. BEKASI</p>
            <h1 class="text-3xl font-extrabold text-[#0f2d52] tracking-tight">Registrasi Akun Magang</h1>
        </div>

        <!-- Form -->
        <form class="space-y-5">
            <!-- Nama Lengkap -->
            <div class="space-y-1.5">
                <label class="text-sm font-semibold text-[#475569]">Nama Lengkap</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-[#94a3b8]">
                        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    </span>
                    <input type="text" placeholder="Masukkan nama lengkap sesuai KTP" class="w-full pl-11 pr-4 py-3 text-sm rounded-xl border border-gray-200 focus:border-[#00c3ff] focus:ring-1 focus:ring-[#00c3ff] outline-none bg-white text-gray-700 placeholder-gray-400" required>
                </div>
            </div>

            <!-- NIM & Asal Universitas -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div class="space-y-1.5">
                    <label class="text-sm font-semibold text-[#475569]">NIM</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-[#94a3b8]">
                            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2"></path></svg>
                        </span>
                        <input type="text" placeholder="Nomor Induk Mahasiswa" class="w-full pl-11 pr-4 py-3 text-sm rounded-xl border border-gray-200 focus:border-[#00c3ff] focus:ring-1 focus:ring-[#00c3ff] outline-none bg-white text-gray-700 placeholder-gray-400" required>
                    </div>
                </div>
                <div class="space-y-1.5">
                    <label class="text-sm font-semibold text-[#475569]">Asal Universitas</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-[#94a3b8]">
                            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 14l9-5-9-5-9 5 9 5z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222"></path></svg>
                        </span>
                        <input type="text" placeholder="Nama Perguruan Tinggi" class="w-full pl-11 pr-4 py-3 text-sm rounded-xl border border-gray-200 focus:border-[#00c3ff] focus:ring-1 focus:ring-[#00c3ff] outline-none bg-white text-gray-700 placeholder-gray-400" required>
                    </div>
                </div>
            </div>

            <!-- Email -->
            <div class="space-y-1.5">
                <label class="text-sm font-semibold text-[#475569]">Email</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-[#94a3b8]">
                        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    </span>
                    <input type="email" placeholder="Gunakan email aktif" class="w-full pl-11 pr-4 py-3 text-sm rounded-xl border border-gray-200 focus:border-[#00c3ff] focus:ring-1 focus:ring-[#00c3ff] outline-none bg-white text-gray-700 placeholder-gray-400" required>
                </div>
            </div>

            <!-- Password & Konfirmasi -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div class="space-y-1.5">
                    <label class="text-sm font-semibold text-[#475569]">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-[#94a3b8]">
                            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        </span>
                        <input type="password" placeholder="Minimal 8 karakter" class="w-full pl-11 pr-4 py-3 text-sm rounded-xl border border-gray-200 focus:border-[#00c3ff] focus:ring-1 focus:ring-[#00c3ff] outline-none bg-white text-gray-700 placeholder-gray-400" required>
                    </div>
                </div>
                <div class="space-y-1.5">
                    <label class="text-sm font-semibold text-[#475569]">Konfirmasi Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-[#94a3b8]">
                            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        </span>
                        <input type="password" placeholder="Ulangi password" class="w-full pl-11 pr-4 py-3 text-sm rounded-xl border border-gray-200 focus:border-[#00c3ff] focus:ring-1 focus:ring-[#00c3ff] outline-none bg-white text-gray-700 placeholder-gray-400" required>
                    </div>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="w-full bg-[#00c3ff] hover:bg-[#00ace6] text-white font-bold py-3.5 px-4 rounded-xl transition-all flex items-center justify-center gap-2 mt-4 shadow-lg shadow-[#00c3ff]/30">
                Daftar Akun
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-[#475569] font-medium">
            Sudah punya akun? <a href="#" class="text-[#00c3ff] font-bold hover:underline">Masuk di sini</a>
        </p>
    </div>
</body>
</html>
